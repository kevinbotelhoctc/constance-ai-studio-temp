<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Constance AI - Aguardando Aprovação</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f609b7",
                        "background-light": "#f5f5f7",
                        "background-dark": "#22101d",
                        "warm-charcoal": "#1d1d1f",
                        "cool-slate": "#6e6e73",
                        "gentle-mist": "#e5e5ea",
                        "soft-blush": "#fce4f4"
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-6 selection:bg-primary/20">
<main class="w-full max-w-[480px] animate-in fade-in zoom-in duration-700">
<div class="bg-white dark:bg-slate-900 rounded-[12px] shadow-xl shadow-slate-200/50 dark:shadow-none border border-gentle-mist dark:border-slate-800 overflow-hidden flex flex-col items-center p-8 md:p-12 text-center">
<div class="mb-8 relative">
<div class="w-24 h-24 rounded-full bg-soft-blush dark:bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[48px]">
                        schedule
                    </span>
</div>
</div>
<h1 class="text-warm-charcoal dark:text-slate-100 text-2xl font-bold tracking-tight mb-4">
                Solicitação enviada!
            </h1>
<p class="text-cool-slate dark:text-slate-400 text-base leading-relaxed mb-10">
                Nossa equipe irá analisar e liberar seu acesso em breve. 
                Você receberá um e-mail de confirmação assim que seu perfil estiver ativo.
            </p>
<div class="w-full flex items-center justify-center mb-10">
<div class="h-[1px] flex-grow bg-gentle-mist dark:bg-slate-800"></div>
<div class="px-4">
<span class="material-symbols-outlined text-primary text-sm">
                        auto_awesome
                    </span>
</div>
<div class="h-[1px] flex-grow bg-gentle-mist dark:bg-slate-800"></div>
</div>
<a class="group flex items-center justify-center gap-2 border-2 border-primary text-primary hover:bg-primary/5 px-8 py-3 rounded-full transition-all duration-300 font-bold text-sm" href="#">
<span class="material-symbols-outlined text-[20px] transition-transform group-hover:-translate-x-1">
                    arrow_back
                </span>
                Voltar para o Login
            </a>
</div>
<footer class="mt-8 text-center">
<p class="text-cool-slate dark:text-slate-500 text-xs font-medium tracking-widest uppercase opacity-60">
                Constance AI Studio
            </p>
</footer>
</main>
<div class="fixed inset-0 pointer-events-none overflow-hidden -z-10 opacity-20">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/20 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[30%] h-[30%] bg-primary/10 blur-[100px] rounded-full"></div>
</div>
<script src="nav.js"></script></body></html>
